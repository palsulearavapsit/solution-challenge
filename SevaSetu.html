<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SevaSetu — Volunteer Coordination</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet" />

<style>
  :root {
    --canvas: oklch(0.975 0.012 80);
    --canvas-2: oklch(0.955 0.018 75);
    --paper: oklch(0.99 0.005 80);
    --ink: oklch(0.20 0.02 60);
    --ink-2: oklch(0.38 0.02 60);
    --ink-3: oklch(0.55 0.02 60);
    --line: oklch(0.88 0.015 75);
    --line-2: oklch(0.82 0.02 75);

    --saffron: oklch(0.72 0.16 60);
    --saffron-deep: oklch(0.58 0.18 50);
    --saffron-soft: oklch(0.94 0.05 75);

    --sage: oklch(0.62 0.08 150);
    --sage-soft: oklch(0.94 0.04 150);

    --crit: oklch(0.58 0.20 25);
    --crit-soft: oklch(0.94 0.05 30);
    --high: oklch(0.68 0.17 45);
    --med:  oklch(0.74 0.13 85);
    --low:  oklch(0.66 0.10 150);

    --indigo: oklch(0.45 0.08 270);

    --radius: 14px;
    --radius-sm: 8px;
    --shadow-1: 0 1px 0 oklch(0.88 0.02 75 / 0.6), 0 1px 2px oklch(0.20 0.02 60 / 0.04);
    --shadow-2: 0 6px 24px -10px oklch(0.20 0.02 60 / 0.18), 0 2px 6px -2px oklch(0.20 0.02 60 / 0.06);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    background: var(--canvas);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background-image:
      radial-gradient(circle at 8% 0%, oklch(0.95 0.05 75 / 0.6) 0%, transparent 35%),
      radial-gradient(circle at 92% 100%, oklch(0.94 0.04 150 / 0.4) 0%, transparent 40%);
    background-attachment: fixed;
    min-height: 100vh;
  }

  .serif { font-family: 'Instrument Serif', 'Georgia', serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
  .deva { font-family: 'Tiro Devanagari Hindi', serif; }

  button { font: inherit; color: inherit; cursor: pointer; }
  input, textarea, select { font: inherit; color: inherit; }

  ::selection { background: var(--saffron-soft); color: var(--ink); }

  /* App shell */
  .app {
    max-width: 1440px;
    margin: 0 auto;
    padding: 24px 28px 80px;
  }

  /* ─── Header ─── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 8px 0 20px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--saffron) 0%, var(--saffron-deep) 100%);
    display: grid; place-items: center;
    box-shadow: 0 6px 14px -6px var(--saffron-deep);
    position: relative;
  }
  .brand-mark svg { width: 26px; height: 26px; color: white; }
  .brand-text { display: flex; flex-direction: column; line-height: 1.05; }
  .brand-text .en { font-family: 'Instrument Serif', serif; font-size: 26px; letter-spacing: -0.02em; }
  .brand-text .hi { font-family: 'Tiro Devanagari Hindi', serif; font-size: 13px; color: var(--ink-3); margin-top: 2px; }

  .top-meta { display: flex; align-items: center; gap: 18px; }
  .live-dot {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Geist Mono', monospace; font-size: 11px;
    color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.08em;
  }
  .live-dot::before {
    content: ""; width: 8px; height: 8px; border-radius: 50%;
    background: var(--sage); box-shadow: 0 0 0 0 var(--sage);
    animation: pulse-dot 2s ease-out infinite;
  }
  @keyframes pulse-dot {
    0% { box-shadow: 0 0 0 0 oklch(0.62 0.08 150 / 0.6); }
    70% { box-shadow: 0 0 0 8px oklch(0.62 0.08 150 / 0); }
    100% { box-shadow: 0 0 0 0 oklch(0.62 0.08 150 / 0); }
  }

  .nav {
    display: flex; gap: 4px;
    padding: 4px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 999px;
  }
  .nav button {
    border: 0; background: transparent;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
    color: var(--ink-2);
    transition: all 0.15s;
  }
  .nav button:hover { color: var(--ink); }
  .nav button.active {
    background: var(--ink); color: var(--canvas);
  }

  .me {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 14px 6px 6px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 999px;
  }
  .me .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--indigo), var(--saffron));
    display: grid; place-items: center;
    color: white; font-weight: 600; font-size: 12px;
  }

  /* ─── Hero / Mission strip ─── */
  .hero {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 24px;
    margin-bottom: 28px;
  }
  .hero-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px 30px;
    position: relative;
    overflow: hidden;
  }
  .hero-card.dark {
    background: linear-gradient(135deg, oklch(0.22 0.03 60), oklch(0.16 0.025 50));
    color: oklch(0.95 0.01 75);
    border-color: oklch(0.30 0.02 60);
  }
  .hero-card.dark .label { color: oklch(0.75 0.02 75); }
  .hero-card.dark .helper { color: oklch(0.78 0.02 75); }

  .label {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.10em;
    margin-bottom: 14px;
  }
  .hero h1 {
    margin: 0;
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 42px;
    line-height: 1.05;
    letter-spacing: -0.015em;
    text-wrap: balance;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--saffron-deep);
    font-feature-settings: "ss01";
  }
  .hero .helper { margin-top: 14px; color: var(--ink-2); max-width: 52ch; font-size: 14px; }

  .hero-actions { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px; font-weight: 500;
    border: 1px solid var(--line);
    background: var(--paper); color: var(--ink);
    transition: all 0.15s ease;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-1); border-color: var(--line-2); }
  .btn.primary {
    background: var(--ink); color: var(--canvas); border-color: var(--ink);
  }
  .btn.primary:hover { background: oklch(0.10 0.02 60); }
  .btn.saffron {
    background: var(--saffron); color: white; border-color: var(--saffron-deep);
    box-shadow: 0 6px 14px -8px var(--saffron-deep);
  }
  .btn.saffron:hover { background: var(--saffron-deep); }
  .btn.ghost { background: transparent; }
  .btn.tiny { padding: 6px 10px; font-size: 12px; border-radius: 8px; }

  /* Impact ticker (right card) */
  .impact-stack { display: flex; flex-direction: column; gap: 18px; }
  .impact-headline { font-family: 'Instrument Serif', serif; font-size: 56px; line-height: 0.95; letter-spacing: -0.02em; }
  .impact-headline .unit { font-size: 18px; color: oklch(0.78 0.02 75); margin-left: 8px; font-family: 'Geist Mono', monospace; letter-spacing: 0.04em; }

  .micro-meters { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .micro {
    border-top: 1px solid oklch(0.30 0.02 60);
    padding-top: 12px;
  }
  .micro .v { font-family: 'Instrument Serif', serif; font-size: 22px; }
  .micro .k { font-size: 11px; color: oklch(0.78 0.02 75); margin-top: 2px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; }

  /* ─── KPI strip ─── */
  .kpis {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
    overflow: hidden;
  }
  .kpi .k { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .kpi .v { font-family: 'Instrument Serif', serif; font-size: 38px; line-height: 1; letter-spacing: -0.02em; }
  .kpi .d { font-size: 12px; color: var(--ink-2); display: flex; align-items: center; gap: 6px; }
  .kpi .delta { color: var(--sage); font-family: 'Geist Mono', monospace; font-size: 11px; }
  .kpi .delta.neg { color: var(--crit); }
  .kpi .spark { position: absolute; right: 10px; top: 12px; width: 64px; height: 22px; opacity: 0.7; }

  /* ─── Section heads ─── */
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 32px 0 14px;
  }
  .section-head h2 {
    margin: 0;
    font-family: 'Instrument Serif', serif;
    font-size: 28px; font-weight: 400; letter-spacing: -0.01em;
  }
  .section-head .sub { color: var(--ink-3); font-size: 13px; }

  /* ─── Filter chips ─── */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12px;
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--line-2); color: var(--ink); }
  .chip.active { background: var(--ink); color: var(--canvas); border-color: var(--ink); }
  .chip .count { font-family: 'Geist Mono', monospace; font-size: 10px; opacity: 0.7; }
  .chip .swatch { width: 8px; height: 8px; border-radius: 50%; }

  /* ─── Main grid: needs board + side panel ─── */
  .board {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 20px;
    align-items: start;
  }

  /* Need card */
  .need-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    position: relative;
    transition: all 0.2s ease;
    cursor: default;
  }
  .need-card:hover {
    border-color: var(--line-2);
    box-shadow: var(--shadow-2);
    transform: translateY(-1px);
  }
  .need-card.drop-target {
    border-color: var(--saffron);
    background: var(--saffron-soft);
    box-shadow: 0 0 0 3px oklch(0.72 0.16 60 / 0.18);
  }
  .need-card.resolved {
    background: var(--sage-soft);
    border-color: oklch(0.78 0.06 150);
  }
  .need-card .urg-bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; border-radius: var(--radius) 0 0 var(--radius);
  }
  .need-row1 { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
  .need-area { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink-3); font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; }
  .need-title { font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1.15; margin: 4px 0 0; letter-spacing: -0.01em; }
  .need-story { color: var(--ink-2); font-size: 13.5px; margin-top: 8px; max-width: 60ch; }
  .need-meta {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    margin-top: 14px;
    font-size: 12px;
    color: var(--ink-3);
  }
  .need-meta .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--canvas-2);
    border: 1px solid var(--line);
  }
  .need-meta .pill.urg-c { color: var(--crit); border-color: oklch(0.85 0.08 30); background: var(--crit-soft); }
  .need-meta .pill.urg-h { color: oklch(0.50 0.16 45); border-color: oklch(0.85 0.08 50); background: oklch(0.96 0.04 60); }
  .need-meta .pill.urg-m { color: oklch(0.45 0.10 85); border-color: oklch(0.85 0.05 85); background: oklch(0.97 0.03 85); }
  .need-meta .pill.urg-l { color: oklch(0.40 0.08 150); border-color: oklch(0.85 0.05 150); background: var(--sage-soft); }

  .need-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }

  .progress {
    height: 4px;
    background: var(--canvas-2);
    border-radius: 4px;
    margin-top: 12px;
    overflow: hidden;
  }
  .progress > div {
    height: 100%;
    background: linear-gradient(90deg, var(--saffron), var(--saffron-deep));
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .need-card.resolved .progress > div { background: var(--sage); }

  .assigned-list {
    display: flex; align-items: center; gap: -6px; margin-left: 0;
  }
  .assigned-list .av {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--paper);
    margin-left: -6px;
    display: grid; place-items: center;
    font-size: 10px; font-weight: 600; color: white;
  }
  .assigned-list .av:first-child { margin-left: 0; }

  /* ─── Side panel ─── */
  .side {
    display: flex; flex-direction: column; gap: 16px;
    position: sticky; top: 20px;
  }
  .panel {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
  }
  .panel h3 {
    margin: 0 0 4px;
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 20px;
    letter-spacing: -0.01em;
  }
  .panel .sub { color: var(--ink-3); font-size: 12px; margin-bottom: 14px; }

  .vol-card {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid transparent;
    cursor: grab;
    transition: all 0.15s;
    user-select: none;
  }
  .vol-card:hover { background: var(--canvas-2); border-color: var(--line); }
  .vol-card:active { cursor: grabbing; }
  .vol-card.dragging { opacity: 0.5; }
  .vol-card.assigned { opacity: 0.6; }
  .vol-card .av {
    width: 36px; height: 36px; border-radius: 50%;
    display: grid; place-items: center;
    color: white; font-weight: 600; font-size: 13px;
    flex-shrink: 0;
  }
  .vol-card .name { font-weight: 500; font-size: 13px; }
  .vol-card .skill { font-size: 11px; color: var(--ink-3); font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; }
  .vol-card .status { margin-left: auto; font-size: 10px; padding: 3px 8px; border-radius: 999px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; }
  .vol-card .status.avail { background: var(--sage-soft); color: oklch(0.40 0.08 150); }
  .vol-card .status.busy { background: var(--canvas-2); color: var(--ink-3); }

  /* Drop hint */
  .drop-hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--canvas);
    padding: 10px 18px; border-radius: 999px;
    font-size: 12px; font-family: 'Geist Mono', monospace;
    box-shadow: var(--shadow-2);
    z-index: 50;
    pointer-events: none;
    opacity: 0; transform: translateX(-50%) translateY(8px);
    transition: all 0.2s ease;
  }
  .drop-hint.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── Map ─── */
  .map-wrap {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    margin-top: 18px;
    overflow: hidden;
  }
  .map-canvas {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background:
      radial-gradient(circle at 30% 70%, oklch(0.92 0.04 200 / 0.4), transparent 50%),
      radial-gradient(circle at 70% 30%, oklch(0.94 0.04 75 / 0.5), transparent 50%),
      oklch(0.96 0.01 75);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .map-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, oklch(0.20 0.02 60 / 0.05) 1px, transparent 1px),
      linear-gradient(to bottom, oklch(0.20 0.02 60 / 0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .map-river {
    position: absolute;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .marker {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 2;
    width: 14px;
    height: 14px;
    display: block;
    padding: 0;
  }
  .marker .pulse {
    position: absolute; left: 50%; top: 50%;
    width: 16px; height: 16px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: pulse-marker 2s ease-out infinite;
    pointer-events: none;
  }
  @keyframes pulse-marker {
    0% { box-shadow: 0 0 0 0 currentColor; opacity: 0.6; }
    100% { box-shadow: 0 0 0 22px transparent; opacity: 0; }
  }
  .marker .dot {
    position: absolute;
    inset: 0;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: currentColor;
    border: 2px solid var(--paper);
    box-shadow: 0 2px 6px oklch(0.20 0.02 60 / 0.3);
    box-sizing: border-box;
  }
  .marker.urg-c { color: var(--crit); }
  .marker.urg-h { color: var(--high); }
  .marker.urg-m { color: var(--med); }
  .marker.urg-l { color: var(--low); }
  .marker .label {
    position: absolute;
    top: 20px; left: 50%; transform: translateX(-50%);
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    color: var(--ink);
    background: var(--paper);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--line);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .marker:hover .label, .marker.active .label { opacity: 1; }

  .map-legend {
    display: flex; gap: 14px; align-items: center;
    margin-top: 12px;
    font-size: 11px; color: var(--ink-3);
    font-family: 'Geist Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .map-legend .lg { display: inline-flex; align-items: center; gap: 6px; }
  .map-legend .swatch { width: 10px; height: 10px; border-radius: 50%; }

  /* ─── Add need form ─── */
  .add-form {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 18px;
  }
  .add-form textarea {
    width: 100%;
    min-height: 80px;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    background: var(--canvas);
    resize: vertical;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .add-form textarea:focus { outline: none; border-color: var(--ink); background: var(--paper); }
  .ai-preview {
    margin-top: 12px;
    padding: 12px 14px;
    background: linear-gradient(90deg, var(--saffron-soft), oklch(0.96 0.03 200));
    border: 1px dashed oklch(0.78 0.08 60);
    border-radius: 10px;
    font-size: 12.5px;
    color: var(--ink-2);
    display: flex; align-items: center; gap: 10px;
  }
  .ai-preview .tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 3px 8px;
    border-radius: 999px;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--ink);
  }
  .ai-preview .pulse-icon {
    width: 14px; height: 14px;
    flex-shrink: 0;
    color: var(--saffron-deep);
    animation: spin 4s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── Activity feed ─── */
  .feed-item {
    display: flex; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 12.5px;
  }
  .feed-item:last-child { border-bottom: 0; }
  .feed-item .time { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--ink-3); flex-shrink: 0; padding-top: 2px; min-width: 36px; }
  .feed-item .dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 6px; flex-shrink: 0;
  }
  .feed-item .text { color: var(--ink-2); }
  .feed-item .text b { color: var(--ink); font-weight: 500; }

  /* Drag preview */
  .drag-ghost {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    transform: translate(-50%, -50%);
    background: var(--paper);
    border: 1px solid var(--line-2);
    border-radius: 10px;
    padding: 8px 12px;
    box-shadow: var(--shadow-2);
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
  }

  /* Section: Volunteer journey */
  .journey {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .stage {
    padding: 16px 18px;
    border-right: 1px solid var(--line);
    position: relative;
  }
  .stage:last-child { border-right: 0; }
  .stage .step {
    font-family: 'Geist Mono', monospace; font-size: 10px;
    color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase;
  }
  .stage .name { font-family: 'Instrument Serif', serif; font-size: 20px; margin-top: 4px; }
  .stage .count { font-size: 11px; color: var(--ink-3); margin-top: 6px; font-family: 'Geist Mono', monospace; }
  .stage.cur { background: var(--saffron-soft); }

  /* Footer note */
  .footnote {
    margin-top: 40px;
    padding: 24px;
    text-align: center;
    color: var(--ink-3);
    font-size: 12px;
    font-family: 'Geist Mono', monospace;
    border-top: 1px solid var(--line);
  }
  .footnote .deva { font-family: 'Tiro Devanagari Hindi', serif; font-size: 14px; color: var(--ink-2); display: block; margin-bottom: 4px; }

  /* ─── Volunteers tab ─── */
  .vol-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .vol-tile {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
    transition: all 0.2s;
  }
  .vol-tile:hover { box-shadow: var(--shadow-2); transform: translateY(-1px); }
  .vol-tile .head { display: flex; align-items: center; gap: 12px; }
  .vol-tile .name-block { flex: 1; min-width: 0; }
  .vol-tile h4 { margin: 0; font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: 400; letter-spacing: -0.01em; }
  .vol-tile .sub { font-size: 11px; color: var(--ink-3); font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .vol-tile .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border-top: 1px solid var(--line); padding-top: 12px; }
  .vol-tile .stat { display: flex; flex-direction: column; gap: 2px; }
  .vol-tile .stat .v { font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1; }
  .vol-tile .stat .k { font-size: 10px; color: var(--ink-3); font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; }
  .vol-tile .skill-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--saffron-soft); border: 1px solid oklch(0.88 0.05 60);
    color: var(--saffron-deep);
    padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
  }
  .vol-tile .rating {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--ink-2);
    font-family: 'Geist Mono', monospace; font-size: 11px;
  }
  .vol-tile .rating .star { color: oklch(0.75 0.14 80); }

  .leaderboard {
    background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 20px; margin-bottom: 24px;
  }
  .leader-row {
    display: grid;
    grid-template-columns: 32px 1fr 100px 80px 60px;
    align-items: center; gap: 14px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 13px;
  }
  .leader-row:last-child { border-bottom: 0; }
  .leader-row .rank { font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--ink-3); width: 32px; }
  .leader-row .rank.top { color: var(--saffron-deep); }
  .leader-row .bar { height: 4px; background: var(--canvas-2); border-radius: 4px; overflow: hidden; }
  .leader-row .bar > div { height: 100%; background: linear-gradient(90deg, var(--saffron), var(--saffron-deep)); border-radius: 4px; }

  /* ─── Impact tab ─── */
  .impact-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .impact-stat {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    position: relative;
    overflow: hidden;
  }
  .impact-stat .v { font-family: 'Instrument Serif', serif; font-size: 56px; line-height: 0.95; letter-spacing: -0.02em; }
  .impact-stat .k { font-size: 12px; color: var(--ink-3); margin-top: 6px; font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; }
  .impact-stat .delta { font-size: 11px; color: var(--sage); margin-top: 8px; font-family: 'Geist Mono', monospace; }
  .impact-stat.dark { background: linear-gradient(135deg, oklch(0.22 0.03 60), oklch(0.16 0.025 50)); color: oklch(0.95 0.01 75); border-color: oklch(0.30 0.02 60); }
  .impact-stat.dark .k { color: oklch(0.78 0.02 75); }

  .impact-bars {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 24px;
  }
  .bar-row {
    display: grid;
    grid-template-columns: 160px 1fr 80px;
    align-items: center;
    gap: 14px;
    padding: 8px 0;
    font-size: 13px;
  }
  .bar-row .label-text { color: var(--ink-2); display: flex; align-items: center; gap: 8px; }
  .bar-row .track { height: 10px; background: var(--canvas-2); border-radius: 6px; overflow: hidden; position: relative; }
  .bar-row .fill {
    height: 100%; border-radius: 6px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .bar-row .num { font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--ink); text-align: right; }

  .stories {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  }
  .story-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .story-card .photo {
    aspect-ratio: 16 / 10;
    border-radius: 10px;
    background:
      repeating-linear-gradient(45deg, oklch(0.92 0.03 75), oklch(0.92 0.03 75) 8px, oklch(0.95 0.02 75) 8px, oklch(0.95 0.02 75) 16px);
    display: grid; place-items: center;
    color: var(--ink-3);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.08em;
    border: 1px solid var(--line);
  }
  .story-card h4 { margin: 0; font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: 400; line-height: 1.15; letter-spacing: -0.01em; }
  .story-card .quote { color: var(--ink-2); font-size: 13px; font-style: italic; border-left: 2px solid var(--saffron); padding-left: 12px; }
  .story-card .by { font-size: 11px; color: var(--ink-3); font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; }

  /* Map tab fullscreen variant */
  .map-fullscreen .map-canvas { aspect-ratio: 16 / 9; min-height: 520px; }
  .map-side {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
    max-height: 580px; overflow-y: auto;
  }
  .map-need-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line);
    cursor: pointer;
    transition: background 0.15s;
  }
  .map-need-row:hover { background: var(--canvas-2); }
  .map-need-row:last-child { border-bottom: 0; }
  .map-need-row .marker-mini {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0; margin-top: 4px;
    border: 2px solid var(--paper);
    box-shadow: 0 1px 3px oklch(0.20 0.02 60 / 0.2);
  }
  .map-need-row .body { flex: 1; min-width: 0; }
  .map-need-row .ttl { font-size: 13px; font-weight: 500; }
  .map-need-row .meta { font-size: 11px; color: var(--ink-3); font-family: 'Geist Mono', monospace; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

  @media (max-width: 1100px) {
    .vol-grid { grid-template-columns: repeat(2, 1fr); }
    .impact-grid { grid-template-columns: repeat(2, 1fr); }
    .stories { grid-template-columns: 1fr; }
  }
  @media (max-width: 1100px) {
    .board { grid-template-columns: 1fr; }
    .hero { grid-template-columns: 1fr; }
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .side { position: static; }
    .journey { grid-template-columns: 1fr 1fr; }
  }

  /* ─── Leaflet map overrides ─── */
  .leaflet-container {
    font-family: 'Geist', sans-serif;
    border-radius: 10px;
  }
  .leaflet-tile-pane { filter: saturate(0.85) brightness(1.04); }
  .seva-marker { position: relative; width: 18px; height: 18px; cursor: pointer; }
  .seva-marker .sdot {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: currentColor;
    border: 2px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    transition: transform .15s;
  }
  .seva-marker:hover .sdot { transform: scale(1.35); }
  .seva-marker .spulse {
    position: absolute; left: 50%; top: 50%;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid currentColor;
    transform: translate(-50%,-50%);
    animation: seva-pulse 2s ease-out infinite;
    pointer-events: none;
  }
  @keyframes seva-pulse {
    0%   { transform: translate(-50%,-50%) scale(0.6); opacity: 0.8; }
    100% { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
  }
  .seva-marker.sel .sdot { transform: scale(1.6); box-shadow: 0 0 0 3px white, 0 2px 8px rgba(0,0,0,0.35); }
  .seva-marker.urg-critical { color: var(--crit); }
  .seva-marker.urg-high     { color: var(--high); }
  .seva-marker.urg-medium   { color: var(--med);  }
  .seva-marker.urg-low      { color: var(--low);  }
  .leaflet-tooltip {
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    border: 1px solid var(--line) !important;
    border-radius: 8px !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10) !important;
    padding: 6px 10px !important;
    background: var(--paper) !important;
    color: var(--ink) !important;
  }
  .leaflet-tooltip::before { display: none !important; }
  .leaflet-control-zoom a {
    font-family: 'Geist', sans-serif !important;
    border-radius: 6px !important;
    color: var(--ink) !important;
  }
  .leaflet-control-attribution { font-size: 9px !important; opacity: 0.5; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="seva-data.jsx"></script>
  <script type="text/babel" src="seva-icons.jsx"></script>
  <script type="text/babel" src="seva-needs.jsx"></script>
  <script type="text/babel" src="seva-volunteers.jsx"></script>
  <script type="text/babel" src="seva-map.jsx"></script>
  <script type="text/babel" src="seva-views.jsx"></script>
  <script type="text/babel" src="seva-modals.jsx"></script>
  <script type="text/babel" src="seva-app.jsx"></script>
</body>
